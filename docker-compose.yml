services:
  ollama:
    image: ollama/ollama:latest
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_pageindex}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_pageindex}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rag:rag_password@postgres:5432/rag_pageindex}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_STORAGE_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-rag_session}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_PROVIDER: ${API_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      USE_FAKE_OPENAI: ${USE_FAKE_OPENAI:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DIMENSIONS: ${LOCAL_EMBEDDING_DIMENSIONS:-1024}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-8}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-none}
      LOCAL_RERANKER_MODEL: ${LOCAL_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      LOCAL_RERANKER_DEVICE: ${LOCAL_RERANKER_DEVICE:-cpu}
      RERANKER_TOP_K: ${RERANKER_TOP_K:-30}
      RERANKER_WEIGHT: ${RERANKER_WEIGHT:-0.35}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3111}
      ENABLE_RAG_ANYTHING: ${ENABLE_RAG_ANYTHING:-true}
      RAG_ANYTHING_PARSER: ${RAG_ANYTHING_PARSER:-mineru}
      PDF_OCR_ENABLED: ${PDF_OCR_ENABLED:-true}
      PDF_OCR_ENGINE: ${PDF_OCR_ENGINE:-auto}
      PDF_OCR_LANG: ${PDF_OCR_LANG:-vie+eng+chi_sim}
      PDF_OCR_SCALE: ${PDF_OCR_SCALE:-2.0}
      PDF_OCR_MAX_PAGES: ${PDF_OCR_MAX_PAGES:-100}
      OCR_MIN_LINE_CONFIDENCE: ${OCR_MIN_LINE_CONFIDENCE:-0.35}
      PADDLE_OCR_LANG: ${PADDLE_OCR_LANG:-vi,ch}
      PADDLE_OCR_DEVICE: ${PADDLE_OCR_DEVICE:-cpu}
      VIETOCR_DEVICE: ${VIETOCR_DEVICE:-cpu}
      VIETOCR_CONFIG: ${VIETOCR_CONFIG:-vgg_transformer}
      PAGEINDEX_MIN_PAGES: ${PAGEINDEX_MIN_PAGES:-30}
      PAGEINDEX_COMMAND: ${PAGEINDEX_COMMAND:-}
      SYNC_INGESTION_ON_QUEUE_FAILURE: ${SYNC_INGESTION_ON_QUEUE_FAILURE:-false}
      CHAT_CONTEXT_LIMIT: ${CHAT_CONTEXT_LIMIT:-5}
      CHAT_CONTEXT_MAX_CHARS: ${CHAT_CONTEXT_MAX_CHARS:-3500}
      CHAT_CHUNK_MAX_CHARS: ${CHAT_CHUNK_MAX_CHARS:-900}
      CHAT_MIN_RELEVANCE_SCORE: ${CHAT_MIN_RELEVANCE_SCORE:-0.35}
      CHAT_MIN_LEXICAL_SCORE: ${CHAT_MIN_LEXICAL_SCORE:-0.08}
    ports:
      - "8111:8000"
    volumes:
      - rag-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: python -m app.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rag:rag_password@postgres:5432/rag_pageindex}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_STORAGE_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-rag_session}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_PROVIDER: ${API_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      USE_FAKE_OPENAI: ${USE_FAKE_OPENAI:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-BAAI/bge-m3}
      LOCAL_EMBEDDING_DIMENSIONS: ${LOCAL_EMBEDDING_DIMENSIONS:-1024}
      LOCAL_EMBEDDING_DEVICE: ${LOCAL_EMBEDDING_DEVICE:-cpu}
      LOCAL_EMBEDDING_BATCH_SIZE: ${LOCAL_EMBEDDING_BATCH_SIZE:-8}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-none}
      LOCAL_RERANKER_MODEL: ${LOCAL_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      LOCAL_RERANKER_DEVICE: ${LOCAL_RERANKER_DEVICE:-cpu}
      RERANKER_TOP_K: ${RERANKER_TOP_K:-30}
      RERANKER_WEIGHT: ${RERANKER_WEIGHT:-0.35}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3111}
      ENABLE_RAG_ANYTHING: ${ENABLE_RAG_ANYTHING:-true}
      RAG_ANYTHING_PARSER: ${RAG_ANYTHING_PARSER:-mineru}
      PDF_OCR_ENABLED: ${PDF_OCR_ENABLED:-true}
      PDF_OCR_ENGINE: ${PDF_OCR_ENGINE:-auto}
      PDF_OCR_LANG: ${PDF_OCR_LANG:-vie+eng+chi_sim}
      PDF_OCR_SCALE: ${PDF_OCR_SCALE:-2.0}
      PDF_OCR_MAX_PAGES: ${PDF_OCR_MAX_PAGES:-100}
      OCR_MIN_LINE_CONFIDENCE: ${OCR_MIN_LINE_CONFIDENCE:-0.35}
      PADDLE_OCR_LANG: ${PADDLE_OCR_LANG:-vi,ch}
      PADDLE_OCR_DEVICE: ${PADDLE_OCR_DEVICE:-cpu}
      VIETOCR_DEVICE: ${VIETOCR_DEVICE:-cpu}
      VIETOCR_CONFIG: ${VIETOCR_CONFIG:-vgg_transformer}
      PAGEINDEX_MIN_PAGES: ${PAGEINDEX_MIN_PAGES:-30}
      PAGEINDEX_COMMAND: ${PAGEINDEX_COMMAND:-}
      SYNC_INGESTION_ON_QUEUE_FAILURE: ${SYNC_INGESTION_ON_QUEUE_FAILURE:-false}
      CHAT_CONTEXT_LIMIT: ${CHAT_CONTEXT_LIMIT:-5}
      CHAT_CONTEXT_MAX_CHARS: ${CHAT_CONTEXT_MAX_CHARS:-3500}
      CHAT_CHUNK_MAX_CHARS: ${CHAT_CHUNK_MAX_CHARS:-900}
      CHAT_MIN_RELEVANCE_SCORE: ${CHAT_MIN_RELEVANCE_SCORE:-0.35}
      CHAT_MIN_LEXICAL_SCORE: ${CHAT_MIN_LEXICAL_SCORE:-0.08}
    volumes:
      - rag-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8111}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8111}
    ports:
      - "3111:3111"
    depends_on:
      - api

volumes:
  postgres-data:
  rag-data:
  ollama-data:
