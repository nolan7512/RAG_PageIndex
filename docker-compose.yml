services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_pageindex}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_pageindex}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rag:rag_password@postgres:5432/rag_pageindex}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_STORAGE_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-rag_session}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      USE_FAKE_OPENAI: ${USE_FAKE_OPENAI:-false}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3111}
      ENABLE_RAG_ANYTHING: ${ENABLE_RAG_ANYTHING:-true}
      RAG_ANYTHING_PARSER: ${RAG_ANYTHING_PARSER:-mineru}
      PAGEINDEX_MIN_PAGES: ${PAGEINDEX_MIN_PAGES:-30}
      PAGEINDEX_COMMAND: ${PAGEINDEX_COMMAND:-}
      SYNC_INGESTION_ON_QUEUE_FAILURE: ${SYNC_INGESTION_ON_QUEUE_FAILURE:-false}
    ports:
      - "8111:8000"
    volumes:
      - rag-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: python -m app.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rag:rag_password@postgres:5432/rag_pageindex}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_STORAGE_DIR: /data
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-rag_session}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      USE_FAKE_OPENAI: ${USE_FAKE_OPENAI:-false}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3111}
      ENABLE_RAG_ANYTHING: ${ENABLE_RAG_ANYTHING:-true}
      RAG_ANYTHING_PARSER: ${RAG_ANYTHING_PARSER:-mineru}
      PAGEINDEX_MIN_PAGES: ${PAGEINDEX_MIN_PAGES:-30}
      PAGEINDEX_COMMAND: ${PAGEINDEX_COMMAND:-}
      SYNC_INGESTION_ON_QUEUE_FAILURE: ${SYNC_INGESTION_ON_QUEUE_FAILURE:-false}
    volumes:
      - rag-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8111}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8111}
    ports:
      - "3111:3111"
    depends_on:
      - api

volumes:
  postgres-data:
  rag-data:
